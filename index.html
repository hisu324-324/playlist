    const { useState, useEffect, useRef } = React;

    // =========================================================================
    // 💡여기에 생성하신 구글 앱스 스크립트 웹앱 배포 URL(반드시 끝이 /exec로 끝나는 주소)을 입력해 주세요!
    // 이제 코드 자체에 고정되어 학생들이나 외부 사용자가 주소를 임의로 바꿀 수 없습니다.
    // =========================================================================
    const DEFAULT_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzfDtZe-dgNv139gLEC1UGOeIBNnF65Q5n46skLr-zm81L58b8F7if_uNrEDZLLsGFo/exec"; 

    // --- Google Apps Script Guide Code defined as safe string constant ---
    // [학년 및 학반 컬럼 연동 보강 완료] 10번째(J열: 학년)와 11번째(K열: 반) 정보까지 빈틈없이 쓰고 읽도록 개편했습니다.
    const APPS_SCRIPT_CODE = `function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  if (!ss) {
    return ContentService.createTextOutput(JSON.stringify({
      error: "오류: 스프레드시트 내부에서 [확장 프로그램] -> [Apps Script]로 만든 스크립트가 아닙니다. 반드시 스프레드시트 창 안에서 생성해 주세요!"
    })).setMimeType(ContentService.MimeType.JSON);
  }
  
  var sheet = ss.getSheets()[0]; // 무조건 첫 번째 탭 고정
  var data = sheet.getDataRange().getValues();
  var rows = [];
  
  if (data.length <= 1) {
    return ContentService.createTextOutput(JSON.stringify([]))
      .setMimeType(ContentService.MimeType.JSON);
  }

  for (var i = 1; i < data.length; i++) {
    rows.push({
      id: String(data[i][7] || data[i][6] || "id_" + i), 
      studentName: String(data[i][0] || ""),
      title: String(data[i][1] || ""),
      artist: String(data[i][2] || ""),
      comment: String(data[i][3] || ""),
      coverType: String(data[i][4] || "preset"),
      coverArt: String(data[i][5] || ""),
      createdAt: Number(data[i][6] || Date.now()),
      youtubeUrl: String(data[i][8] || ""),
      grade: String(data[i][9] || "1"), // 10번째 열 (J열) 학년 정보 로딩
      classNo: String(data[i][10] || "1") // 11번째 열 (K열) 반 정보 로딩
    });
  }
  return ContentService.createTextOutput(JSON.stringify(rows))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheets()[0];
  var postData = JSON.parse(e.postData.contents);
  var ts = Date.now();
  
  sheet.appendRow([
    postData.studentName,
    postData.title,
    postData.artist,
    postData.comment,
    postData.coverType,
    postData.coverArt,
    ts,
    postData.id || ('id_' + ts),
    postData.youtubeUrl || "",
    postData.grade || "1",  // 10번째 열 (J열)에 학년 안전 기록
    postData.classNo || "1"  // 11번째 열 (K열)에 반 안전 기록
  ]);
  
  return ContentService.createTextOutput(JSON.stringify({status: "success"}))
    .setMimeType(ContentService.MimeType.JSON);
}`;

    const IconYoutube = () => (

      <svg className="w-4 h-4 text-sky-800" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M4 4h4v4H4zm12 0h4v4h-4zM4 16h4v4H4zm12 0h4v4h-4zM9 9h6v6H9z" /></svg>
    );

    function App() {
      const sheetUrl = DEFAULT_SHEET_API_URL || '';
      
      const [tracks, setTracks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [lastSyncTime, setLastSyncTime] = useState(null);
      const [isSyncing, setIsSyncing] = useState(false);
      
      // Google API Error state tracker
      const [googleAuthError, setGoogleAuthError] = useState(false);
      
      // Form Input States
      const [studentName, setStudentName] = useState('');
      const [studentGrade, setStudentGrade] = useState('1'); // 학년 (1~6)
      const [studentClass, setStudentClass] = useState('1'); // 반 (1~4)
      const [title, setTitle] = useState('');
      const [artist, setArtist] = useState('');
      const [comment, setComment] = useState('');
      const [youtubeUrl, setYoutubeUrl] = useState('');
      
      // Filter State for viewing
      const [filterGrade, setFilterGrade] = useState('all'); // all or 1~6
      const [filterClass, setFilterClass] = useState('all'); // all or 1~4

      // Pre-upload Verification Preview Player States
      const [searchStatus, setSearchStatus] = useState('idle'); // 'idle' | 'searching' | 'found' | 'not_found'
      const [foundTrack, setFoundTrack] = useState(null); // { title, artist, previewUrl, artworkUrl }
      const [isFormPreviewPlaying, setIsFormPreviewPlaying] = useState(false);
      
      // QR Code Modal State
      const [showQrModal, setShowQrModal] = useState(false);
      
      // Cover Art Selection Options
      const [coverType, setCoverType] = useState('preset'); 
      const [selectedPreset, setSelectedPreset] = useState(0);
      const [uploadedImage, setUploadedImage] = useState('');
      const [aiPrompt, setAiPrompt] = useState('');
      const [aiImage, setAiImage] = useState('');
      const [generatingAi, setGeneratingAi] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [isCompressing, setIsCompressing] = useState(false);
      
      // Active Playback State
      const [nowPlaying, setNowPlaying] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [showDetailModal, setShowDetailModal] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      // Real Audio Preview Streaming Management (iTunes 30s preview)
      const [audioUrl, setAudioUrl] = useState('');
      const [audioLoading, setAudioLoading] = useState(false);
      const [audioError, setAudioError] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(0.8);
      const [isMuted, setIsMuted] = useState(false);

      const playlistContainerRef = useRef(null);
      const audioRef = useRef(null);
      const formAudioRef = useRef(null); // Separate player for form search preview

      const fetchTracksFromSheet = async (showPulse = true) => {
        const trimmedUrl = sheetUrl ? sheetUrl.trim() : "";
        if (!trimmedUrl || !trimmedUrl.startsWith("http")) {
          const localDemo = JSON.parse(localStorage.getItem('summer_playlist_demo_data') || '[]');
          setTracks(localDemo);
          setLoading(false);
          setLastSyncTime(new Date());
          setGoogleAuthError(false);
          return;
        }

        if (showPulse) setIsSyncing(true);
        try {
          const response = await fetch(trimmedUrl + "?t=" + Date.now());
          if (!response.ok) throw new Error("네트워크 응답 오류");
          
          const rawText = await response.text();
          
          // 핵심 검증: 구글 시트 앱스스크립트가 차단당해 HTML 로그인 페이지를 보냈는지 진단
          if (rawText.trim().startsWith("<") || rawText.includes("google-site-verification")) {
            setGoogleAuthError(true);
            throw new Error("Google_Authorization_Required");
          }

          const data = JSON.parse(rawText);
          setGoogleAuthError(false);
          
          if (Array.isArray(data)) {
            const sanitizedData = data.map(item => ({
              id: item.id || "id_" + Math.random(),
              studentName: String(item.studentName || "익명"),
              title: String(item.title || "무제"),
              artist: String(item.artist || "알 수 없음"),
              comment: String(item.comment || ""),
              youtubeUrl: String(item.youtubeUrl || ""),
              coverType: String(item.coverType || "preset"),
              coverArt: String(item.coverArt || ""),
              createdAt: Number(item.createdAt || Date.now()),
              grade: String(item.grade || "1"),
              classNo: String(item.classNo || "1")
            }));
            
            const sorted = sanitizedData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            setTracks(sorted);
            localStorage.setItem('summer_playlist_demo_data', JSON.stringify(sorted));
          }
        } catch (err) {
          console.warn("Google Sheets API 연동 일시적 오류: 로컬 데이터를 유지합니다.", err);
          if (err.message === "Google_Authorization_Required") {
            setGoogleAuthError(true);
          }
          const localDemo = JSON.parse(localStorage.getItem('summer_playlist_demo_data') || '[]');
          setTracks(localDemo);
        } finally {
          setLoading(false);
          setIsSyncing(false);
          setLastSyncTime(new Date());
        }
      };

      useEffect(() => {
        fetchTracksFromSheet();
        const interval = setInterval(() => {
          const trimmedUrl = sheetUrl ? sheetUrl.trim() : "";
          if (trimmedUrl && trimmedUrl.startsWith("http")) {
            fetchTracksFromSheet(false);
          }
        }, 10000);

        return () => clearInterval(interval);
      }, [sheetUrl]);

      const handleSearchAndPreview = async () => {
        if (!title.trim() || !artist.trim()) {
          setErrorMsg('미리 들을 곡명과 가수를 먼저 적어주세요.');
          return;
        }
        setErrorMsg('');
        setSearchStatus('searching');
        setIsFormPreviewPlaying(false);
        if (formAudioRef.current) {
          formAudioRef.current.pause();
        }

        try {
          const searchKeyword = artist.trim() + " " + title.trim();
          const response = await fetch("https://itunes.apple.com/search?term=" + encodeURIComponent(searchKeyword) + "&limit=3&entity=song");
          const data = await response.json();

          if (data.results && data.results.length > 0) {
            const bestTrack = data.results[0];
            setFoundTrack({
              title: bestTrack.trackName,
              artist: bestTrack.artistName,
              previewUrl: bestTrack.previewUrl,
              artworkUrl: bestTrack.artworkUrl100
            });
            setSearchStatus('found');
          } else {
            setSearchStatus('not_found');
            setFoundTrack(null);
          }
        } catch (err) {
          console.error("iTunes Search failed:", err);
          setSearchStatus('not_found');
          setFoundTrack(null);
          setErrorMsg('실시간 음악을 검색하는 도중 네트워크 통신 에러가 발생했습니다.');
        }
      };

      const handleConfirmFoundTrack = () => {
        if (!foundTrack) return;
        setTitle(foundTrack.title);
        setArtist(foundTrack.artist);
        setIsFormPreviewPlaying(false);
        if (formAudioRef.current) {
          formAudioRef.current.pause();
        }
        setErrorMsg('✓ 노래가 확정되었습니다! 아래 등록 버튼을 눌러 제출을 마쳐주세요.');
      };

      const toggleFormPreviewPlay = () => {
        if (!formAudioRef.current || !foundTrack) return;
        
        if (audioRef.current) {
          audioRef.current.pause();
          setIsPlaying(false);
        }

        if (isFormPreviewPlaying) {
          formAudioRef.current.pause();
          setIsFormPreviewPlaying(false);
        } else {
          formAudioRef.current.play()
            .then(() => setIsFormPreviewPlaying(true))
            .catch(e => {
              console.warn("오디오 플레이 불가:", e);
              setIsFormPreviewPlaying(false);
            });
        }
      };

      useEffect(() => {
        if (!nowPlaying) {
          setAudioUrl('');
          setIsPlaying(false);
          setCurrentTime(0);
          setDuration(0);
          return;
        }

        if (formAudioRef.current) {
          formAudioRef.current.pause();
          setIsFormPreviewPlaying(false);
        }

        setAudioLoading(true);
        setAudioError(false);
        setAudioUrl('');
        setCurrentTime(0);
        
        const searchKeyword = nowPlaying.artist + " " + nowPlaying.title;
        fetch("https://itunes.apple.com/search?term=" + encodeURIComponent(searchKeyword) + "&limit=1&entity=song")
          .then(res => res.json())
          .then(data => {
            if (data.results && data.results.length > 0) {
              const track = data.results[0];
              setAudioUrl(track.previewUrl);
              setIsPlaying(true); 
            } else {
              setAudioUrl('');
              setAudioError(true);
              setIsPlaying(true); 
            }
          })
          .catch(err => {
            console.error("Music preview lookup failed: ", err);
            setAudioUrl('');
            setAudioError(true);
            setIsPlaying(true);
          })
          .finally(() => {
            setAudioLoading(false);
          });
      }, [nowPlaying]);

      useEffect(() => {
        if (!audioRef.current) return;
        if (isPlaying) {
          if (audioUrl) {
            audioRef.current.play().catch(e => {
              console.warn("Autoplay blocked:", e);
              setIsPlaying(false);
            });
          }
        } else {
          if (audioUrl) {
            audioRef.current.pause();
          }
        }
      }, [isPlaying, audioUrl]);

      useEffect(() => {
        let interval = null;
        if (isPlaying && !audioUrl) {
          setDuration(30);
          interval = setInterval(() => {
            setCurrentTime((prev) => {
              if (prev >= 30) {
                setIsPlaying(false);
                return 0;
              }
              return prev + 1;
            });
          }, 1000);
        } else {
          if (interval) clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [isPlaying, audioUrl]);

      const handleTimeUpdate = () => {
        if (audioRef.current && audioUrl) {
          setCurrentTime(audioRef.current.currentTime);
          setDuration(audioRef.current.duration || 30);
        }
      };

      const handleAudioEnded = () => {
        setIsPlaying(false);
        setCurrentTime(0);
      };

      const handleSeek = (e) => {
        const value = parseFloat(e.target.value);
        setCurrentTime(value);
        if (audioRef.current && audioUrl) {
          audioRef.current.currentTime = value;
        }
      };

      const handleVolumeChange = (e) => {
        const val = parseFloat(e.target.value);
        setVolume(val);
        if (audioRef.current) {
          audioRef.current.volume = val;
        }
        if (val > 0) setIsMuted(false);

        const mins = Math.floor(timeInSecs / 60);

        return mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');

      const compressImage = (file, maxWidth, maxHeight, quality, callback) => {
        setIsCompressing(true);
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
            setIsCompressing(false);
            callback(compressedBase64);
          };
          img.onerror = () => {
            setIsCompressing(false);
            setErrorMsg('이미지를 디코딩하는 중 에러가 발생했습니다.');
          };
          img.src = event.target.result;
        };
        reader.onerror = () => {
          setIsCompressing(false);
          setErrorMsg('파일을 인식하는 중 에러가 발생했습니다.');
        };
        reader.readAsDataURL(file);
      };

        setErrorMsg('');

          const payload = {
            instances: { prompt: enhancedPrompt },
            parameters: { sampleCount: 1 }
          };
          const apiKey = ""; 
          const apiUrl = "https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=" + apiKey;

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();

              <div className="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-2xl relative border-4 border-sky-200">
                
                <div className="bg-sky-100 px-5 py-3 border-b border-sky-200 flex items-center justify-between text-sky-950 font-bold">
                  <span className="text-sm">여름 플레이리스트 카드 소장</span>
                  <button 
                    type="button"
                    onClick={() => setShowDetailModal(false)}
                    className="hover:bg-sky-200 rounded-lg p-1 text-slate-500 font-bold text-lg"
                  >
                    ✕
                  </button>
                </div>

                <div className="p-6 bg-white" id={"printable-card-" + nowPlaying.id}>
                  <div className="border-4 border-dashed border-sky-100 rounded-2xl p-5 text-center bg-sky-50/20 relative">
                    
                    <div className="text-sky-950 mb-4 select-none">
                      <div className="text-xs font-bold tracking-wider text-sky-600">행복한 여름 음악 시간</div>
                      <h3 className="text-2xl font-black mt-0.5 tracking-tight">나의 여름 플레이리스트</h3>
                      <div className="w-16 h-1 bg-yellow-400 mx-auto mt-1 rounded-full"></div>
                    </div>

                    <div className="w-52 h-52 mx-auto rounded-xl shadow-lg border-4 border-white overflow-hidden mb-5 flex items-center justify-center relative bg-white">
                      {nowPlaying.coverType === 'preset' ? (
                        <div 
                          style={{ background: JSON.parse(nowPlaying.coverArt).style }} 
                          className="w-full h-full flex items-center justify-center text-6xl"
                        >
                          <span>{JSON.parse(nowPlaying.coverArt).emoji}</span>
                        </div>
                      ) : (
                        <img 
                          src={nowPlaying.coverArt} 
                          alt="Detailed Sheet Cover" 
                          className="w-full h-full object-cover" 
                        />
                      )}
                    </div>

                    <div className="space-y-3.5 mb-6 text-left max-w-[240px] mx-auto text-slate-800">
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">곡 제목</span>
                        <span className="text-base font-extrabold text-slate-800 tracking-tight">{nowPlaying.title}</span>
                      </div>
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">가수</span>
                        <span className="text-base font-bold text-slate-700">{nowPlaying.artist}</span>
                      </div>
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">소속 및 이름</span>
                        <span className="text-base font-extrabold text-slate-800">{nowPlaying.grade}학년 {nowPlaying.classNo}반 · {nowPlaying.studentName}</span>
                      </div>
                      {nowPlaying.comment && (
                        <div className="bg-white/80 p-2.5 rounded-lg border border-sky-100 text-xs italic text-slate-600">
                          "{nowPlaying.comment}"
                        </div>
                      )}
                    </div>

                    <div className="flex items-center justify-center gap-6 text-sky-800/60 pt-2 border-t border-sky-100/80">
                      <span className="text-xs">⏮</span>
                      <span className="text-lg">⏸</span>
                      <span className="text-xs">⏭</span>
                      <div className="flex items-center gap-1 bg-yellow-100/60 px-2 py-1 rounded text-[10px] font-bold text-yellow-700">
                        <span>☑ 확인</span>
                      </div>
                    </div>

                  </div>
                </div>

                <div className="bg-sky-50 px-5 py-4 border-t border-sky-200 flex flex-col gap-2">
                  <button
                    type="button"
                    onClick={() => handleExportCard("printable-card-" + nowPlaying.id)}
                    className="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2"
                  >
                    <IconDownload />
                    <span>나의 여름 활동지 이미지 저장 (PNG)</span>
                  </button>
                  <p className="text-[10px] text-center text-slate-500">
                    저장된 이미지는 추후 오프라인 인쇄물 제작, 나만의 디지털 포트폴리오 등으로 다양하게 활용할 수 있습니다.
                  </p>
                </div>

              </div>
            </div>
          )}

          {/* Footer copyright info */}
          <footer className="mt-20 border-t border-sky-200/50 pt-8 text-center text-xs text-sky-800/60 max-w-3xl mx-auto px-4">
            <p className="font-semibold mb-1">우리 학교 여름 플레이리스트 소통 공간</p>
            <p>교내 교육 활동 지원용 플레이보드 공유 프로그램</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
