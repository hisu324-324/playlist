<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리 반 여름 플레이리스트 🌊</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2canvas for card download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 15s linear infinite;
    }
    .animate-spin-paused {
      animation-play-state: paused;
    }
    .summer-gradient {
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    /* Custom scrollbar for aesthetic feel */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(224, 242, 254, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: #7dd3fc;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #38bdf8;
    }
  </style>
</head>
<body class="summer-gradient text-slate-800 min-h-screen font-sans selection:bg-sky-200">

  <div id="root"></div>

  <!-- React & ReactDOM Standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone to transpile JSX/ES6 in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase CDN Legacy Compatibility Scripts (Perfect for Standalone single files) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Main Application Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Firebase Initialization with Multi-Environment Safe Mode ---
    let firebaseConfig = {};
    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = JSON.parse(__firebase_config);
      } else {
        // Fallback for local preview & sandboxed browser testing
        firebaseConfig = {
          apiKey: "mock-api-key",
          authDomain: "mock-domain.firebaseapp.com",
          projectId: "mock-project",
          storageBucket: "mock-bucket",
          messagingSenderId: "mock-sender",
          appId: "mock-app-id"
        };
      }
    } catch (e) {
      console.warn("Firebase config parsing skipped. Using mockup fallback.");
    }

    // Initialize Firebase Compat versions
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(app);
    const db = firebase.firestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'summer-playlist-app';

    const SUMMER_PRESETS = [
      {
        name: "시원한 파도와 모래사장",
        style: "linear-gradient(to bottom, #0284c7, #38bdf8, #fef08a)",
        emoji: "🌊"
      },
      {
        name: "한여름 밤의 불꽃놀이",
        style: "linear-gradient(to top, #1e1b4b, #311042, #701a75)",
        emoji: "🎆"
      },
      {
        name: "열대 바닷가 일몰",
        style: "linear-gradient(to top, #f97316, #f43f5e, #881337)",
        emoji: "🌅"
      },
      {
        name: "싱그러운 청귤 라임",
        style: "linear-gradient(135deg, #4ade80, #22c55e, #bef264)",
        emoji: "🍹"
      },
      {
        name: "여름 뭉게구름 하늘",
        style: "linear-gradient(to bottom, #0ea5e9, #bae6fd, #ffffff)",
        emoji: "☁️"
      }
    ];

    // --- Inline Custom SVG Icons Components ---
    const IconPlus = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
    );
    const IconMusic = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    );
    const IconUpload = () => (
      <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"></path></svg>
    );
    const IconSparkles = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
    );
    const IconDownload = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
    );
    const IconTrash = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
    );
    const IconPlay = () => (
      <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
    );
    const IconPause = () => (
      <svg className="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
    );
    const IconCompass = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"></path></svg>
    );
    const IconShare = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="M8.59 13.51l6.83 3.98m-.01-10.98l-6.82 3.98"></path></svg>
    );
    const IconUser = () => (
      <svg className="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"></path></svg>
    );
    const IconDisc = () => (
      <svg className="w-5 h-5 text-white animate-spin" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
    );
    const IconListMusic = () => (
      <svg className="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M3 9h10M3 13h10M3 17h10"></path></svg>
    );
    const IconCheck = () => (
      <svg className="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"></path></svg>
    );
    const IconAlert = () => (
      <svg className="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4m0 4h.01"></path></svg>
    );
    const IconVolume = () => (
      <svg className="w-5 h-5 text-slate-400 hover:text-white transition-colors" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07"></path></svg>
    );
    const IconMute = () => (
      <svg className="w-5 h-5 text-rose-400 hover:text-white transition-colors" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6m0-6l6 6"></path></svg>
    );
    const IconExternal = () => (
      <svg className="w-3 h-3" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6m4-3h6v6m-11 5L21 3"></path></svg>
    );

    function App() {
      const [userState, setUserState] = useState(null);
      const [tracks, setTracks] = useState([]);
      const [loading, setLoading] = useState(true);
      
      // Form Input States
      const [studentName, setStudentName] = useState('');
      const [title, setTitle] = useState('');
      const [artist, setArtist] = useState('');
      const [comment, setComment] = useState('');
      
      // Custom Modal for confirmations instead of blocky alerts
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      
      // Cover Art Selection Options
      const [coverType, setCoverType] = useState('preset'); 
      const [selectedPreset, setSelectedPreset] = useState(0);
      const [uploadedImage, setUploadedImage] = useState('');
      const [aiPrompt, setAiPrompt] = useState('');
      const [aiImage, setAiImage] = useState('');
      const [generatingAi, setGeneratingAi] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [isCompressing, setIsCompressing] = useState(false);
      
      // Active Auditory & Playback State
      const [nowPlaying, setNowPlaying] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [showDetailModal, setShowDetailModal] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      // Real Audio Streaming Management (iTunes 30s preview)
      const [audioUrl, setAudioUrl] = useState('');
      const [audioLoading, setAudioLoading] = useState(false);
      const [audioError, setAudioError] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(0.8);
      const [isMuted, setIsMuted] = useState(false);

      const playlistContainerRef = useRef(null);
      const audioRef = useRef(null);

      // Rule 3: Auth First on load
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (err) {
            console.error("Firebase auth logic failed:", err);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged((usr) => {
          if (usr) {
            setUserState(usr);
          }
        });
        return () => unsubscribe();
      }, []);

      // Realtime Database fetch
      useEffect(() => {
        if (!userState) return;

        // Rule 1 & Rule 2: Strictly query on /artifacts/{appId}/public/data/playlist
        const publicCollectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('playlist');
        
        const unsubscribe = publicCollectionRef.onSnapshot(
          (snapshot) => {
            const loadedTracks = [];
            snapshot.forEach((doc) => {
              loadedTracks.push({ id: doc.id, ...doc.data() });
            });
            
            // Client side sort (newest created timestamp on top)
            loadedTracks.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            setTracks(loadedTracks);
            setLoading(false);
          },
          (error) => {
            console.error("Firestore database retrieve error: ", error);
            setLoading(false);
          }
        );

        return () => unsubscribe();
      }, [userState]);

      // Dynamic Audio API call on song change
      useEffect(() => {
        if (!nowPlaying) {
          setAudioUrl('');
          setIsPlaying(false);
          setCurrentTime(0);
          setDuration(0);
          return;
        }

        const fetchAudioPreview = async () => {
          setAudioLoading(true);
          setAudioError(false);
          setAudioUrl('');
          setCurrentTime(0);
          
          try {
            const searchKeyword = `${nowPlaying.artist} ${nowPlaying.title}`;
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchKeyword)}&limit=1&entity=song`);
            const data = await res.json();
            
            if (data.results && data.results.length > 0) {
              const track = data.results[0];
              setAudioUrl(track.previewUrl);
              setIsPlaying(true); 
            } else {
              setAudioUrl('');
              setAudioError(true);
              setIsPlaying(true); // fall back to visually playing representation
            }
          } catch (err) {
            console.error("Music streaming lookup failed: ", err);
            setAudioUrl('');
            setAudioError(true);
            setIsPlaying(true);
          } finally {
            setAudioLoading(false);
          }
        };

        fetchAudioPreview();
      }, [nowPlaying]);

      // HTML5 audio state synchronization
      useEffect(() => {
        if (!audioRef.current) return;

        if (isPlaying) {
          if (audioUrl) {
            audioRef.current.play().catch(e => {
              console.warn("Autoplay blocked. Tap play button to trigger.", e);
              setIsPlaying(false);
            });
          }
        } else {
          if (audioUrl) {
            audioRef.current.pause();
          }
        }
      }, [isPlaying, audioUrl]);

      // Audio simulation timer fallback
      useEffect(() => {
        let interval = null;
        if (isPlaying && !audioUrl) {
          setDuration(30);
          interval = setInterval(() => {
            setCurrentTime((prev) => {
              if (prev >= 30) {
                setIsPlaying(false);
                return 0;
              }
              return prev + 1;
            });
          }, 1000);
        } else {
          if (interval) clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [isPlaying, audioUrl]);

      const handleTimeUpdate = () => {
        if (audioRef.current && audioUrl) {
          setCurrentTime(audioRef.current.currentTime);
          setDuration(audioRef.current.duration || 30);
        }
      };

      const handleAudioEnded = () => {
        setIsPlaying(false);
        setCurrentTime(0);
      };

      const handleSeek = (e) => {
        const value = parseFloat(e.target.value);
        setCurrentTime(value);
        if (audioRef.current && audioUrl) {
          audioRef.current.currentTime = value;
        }
      };

      const handleVolumeChange = (e) => {
        const val = parseFloat(e.target.value);
        setVolume(val);
        if (audioRef.current) {
          audioRef.current.volume = val;
        }
        if (val > 0) setIsMuted(false);
      };

      const toggleMute = () => {
        if (!audioRef.current) return;
        const nextMute = !isMuted;
        setIsMuted(nextMute);
        audioRef.current.muted = nextMute;
      };

      const formatTime = (timeInSecs) => {
        if (isNaN(timeInSecs)) return "00:00";
        const mins = Math.floor(timeInSecs / 60);
        const secs = Math.floor(timeInSecs % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      // Quality optimization image compressor 
      const compressImage = (file, maxWidth, maxHeight, quality, callback) => {
        setIsCompressing(true);
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
            setIsCompressing(false);
            callback(compressedBase64);
          };
          img.onerror = () => {
            setIsCompressing(false);
            setErrorMsg('이미지를 디코딩하는 중 에러가 발생했습니다.');
          };
          img.src = event.target.result;
        };
        reader.onerror = () => {
          setIsCompressing(false);
          setErrorMsg('파일을 인식하는 중 에러가 발생했습니다.');
        };
        reader.readAsDataURL(file);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setErrorMsg('');
        compressImage(file, 600, 600, 0.7, (compressedDataUrl) => {
          setUploadedImage(compressedDataUrl);
        });
      };

      const handleGenerateAiImage = async () => {
        if (!aiPrompt.trim()) {
          setErrorMsg('AI 이미지 아이디어를 적어주세요!');
          return;
        }
        setErrorMsg('');
        setGeneratingAi(true);

        try {
          const enhancedPrompt = `A stunning digital artwork of ${aiPrompt}, vibrant gorgeous summer color palette, retro album design, detailed landscape, vector flat style artwork, pristine beach look`;
          const payload = {
            instances: { prompt: enhancedPrompt },
            parameters: { sampleCount: 1 }
          };
          const apiKey = ""; 
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.predictions && result.predictions.length > 0 && result.predictions[0].bytesBase64Encoded) {
            const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            setAiImage(imageUrl);
          } else {
            throw new Error('Image response structure is invalid.');
          }
        } catch (err) {
          console.error(err);
          setErrorMsg('AI 화가 네트워크 통신 실패. 잠시 후 재생성 또는 다른 방식을 택해 주세요.');
        } finally {
          setGeneratingAi(false);
        }
      };

      const handleSubmitTrack = async (e) => {
        e.preventDefault();
        if (!studentName.trim() || !title.trim() || !artist.trim()) {
          setErrorMsg('학생 이름, 곡의 제목, 가수는 필수값입니다.');
          return;
        }
        
        setIsSubmitting(true);
        setErrorMsg('');

        let finalCoverArt = '';
        if (coverType === 'preset') {
          finalCoverArt = JSON.stringify(SUMMER_PRESETS[selectedPreset]);
        } else if (coverType === 'upload') {
          if (!uploadedImage) {
            setErrorMsg('선택하신 업로드용 이미지 파일이 비어 있습니다.');
            setIsSubmitting(false);
            return;
          }
          finalCoverArt = uploadedImage;
        } else if (coverType === 'ai') {
          if (!aiImage) {
            setErrorMsg('생성된 AI 앨범 커버가 없습니다. 먼저 "생성" 단추를 클릭해 주세요.');
            setIsSubmitting(false);
            return;
          }
          finalCoverArt = aiImage;
        }

        try {
          const publicCollectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('playlist');
          await publicCollectionRef.add({
            studentName: studentName.trim(),
            title: title.trim(),
            artist: artist.trim(),
            comment: comment.trim(),
            coverType,
            coverArt: finalCoverArt,
            createdAt: Date.now(),
            creatorUid: userState?.uid || 'anonymous'
          });

          // Clean up form inputs
          setTitle('');
          setArtist('');
          setComment('');
          setUploadedImage('');
          setAiPrompt('');
          setAiImage('');
          
          const boardElement = document.getElementById('class-board-section');
          if (boardElement) {
            boardElement.scrollIntoView({ behavior: 'smooth' });
          }
        } catch (err) {
          console.error("Firestore submit error: ", err);
          setErrorMsg('데이터 전송 지연이 발생했습니다. 다시 작성해 보세요.');
        } finally {
          setIsSubmitting(false);
        }
      };

      const executeDeleteTrack = async () => {
        if (!confirmDeleteId) return;
        try {
          const publicDocRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('playlist').doc(confirmDeleteId);
          await publicDocRef.delete();
          if (nowPlaying?.id === confirmDeleteId) {
            setNowPlaying(null);
            setIsPlaying(false);
          }
          setConfirmDeleteId(null);
        } catch (err) {
          console.error("Deletion failed:", err);
          setErrorMsg('해당 트랙을 삭제하는 과정 중 오류가 발생했습니다.');
        }
      };

      const handlePlayTrack = (track) => {
        setNowPlaying(track);
      };

      const handleExportCard = (cardId) => {
        const cardElement = document.getElementById(cardId);
        if (!cardElement) return;

        if (window.html2canvas) {
          window.html2canvas(cardElement, {
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#ffffff',
            scale: 2 
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = `우리반_여름_플레이리스트_${nowPlaying?.studentName || '카드'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          }).catch(err => {
            console.error("Capturing canvas error: ", err);
            setErrorMsg('카드 다운로드 기능이 차단되었습니다. 모바일 캡처를 이용해 주세요.');
          });
        } else {
          setErrorMsg('이미지 캡처 변환 모듈을 불러오는 중입니다. 잠시 후 시도해 주세요.');
        }
      };

      const openYouTubeSearch = (title, artist, e) => {
        e.stopPropagation();
        const queryStr = `${artist} ${title}`;
        const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(queryStr)}`;
        window.open(url, '_blank');
      };

      return (
        <div className="min-h-screen">
          
          {/* Custom Confirm Delete Modal */}
          {confirmDeleteId && (
            <div className="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">

                            <div className="flex items-center gap-2 mt-1">
                              <button
                                onClick={(e) => openYouTubeSearch(track.title, track.artist, e)}
                                className="text-red-500 hover:text-red-600 flex items-center gap-0.5 text-[10px] font-bold"
                                title="유튜브에서 직접 원곡 듣기"
                              >
                                <span>YouTube 원곡 보기 ↗</span>
                              </button>
                            </div>
                          </div>

                          {/* Hover action panels */}
                          <div className="absolute top-2 right-2 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                handlePlayTrack(track);
                                setShowDetailModal(true);
                              }}
                              className="p-1.5 rounded-lg bg-white/95 hover:bg-sky-100 text-sky-700 transition-colors shadow-sm"
                              title="미술 활동지 카드 저장하기"
                            >
                              <IconShare />
                            </button>
                            <button
                              onClick={(e) => {
                                e.stopPropagation();
                                setConfirmDeleteId(track.id);
                              }}
                              className="p-1.5 rounded-lg bg-white/95 hover:bg-rose-100 text-rose-600 transition-colors shadow-sm"
                              title="트랙 삭제"
                            >
                              <IconTrash />
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </section>
          </main>

          {/* Worksheet Detail Card Download Modal */}
          {showDetailModal && nowPlaying && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl max-w-md w-full overflow-hidden shadow-2xl relative border-4 border-sky-200">
                
                <div className="bg-sky-100 px-5 py-3 border-b border-sky-200 flex items-center justify-between text-sky-950 font-bold">
                  <span className="text-sm">여름 미술활동지 이미지 저장</span>
                  <button 
                    onClick={() => setShowDetailModal(false)}
                    className="hover:bg-sky-200 rounded-lg p-1 text-slate-500 font-bold text-lg"
                  >
                    ✕
                  </button>
                </div>

                <div className="p-6 bg-white" id={`printable-card-${nowPlaying.id}`}>
                  <div className="border-4 border-dashed border-sky-100 rounded-2xl p-5 text-center bg-sky-50/20 relative">
                    
                    <div className="text-sky-950 mb-4 select-none">
                      <div className="text-xs font-bold tracking-wider text-sky-600">아티버셜 월간미술 7월 여름 테마</div>
                      <h3 className="text-2xl font-black mt-0.5 tracking-tight">나의 여름 플레이리스트</h3>
                      <div className="w-16 h-1 bg-yellow-400 mx-auto mt-1 rounded-full"></div>
                    </div>

                    <div className="w-52 h-52 mx-auto rounded-xl shadow-lg border-4 border-white overflow-hidden mb-5 flex items-center justify-center relative bg-white">
                      {nowPlaying.coverType === 'preset' ? (
                        <div 
                          style={{ background: JSON.parse(nowPlaying.coverArt).style }} 
                          className="w-full h-full flex items-center justify-center text-6xl"
                        >
                          <span>{JSON.parse(nowPlaying.coverArt).emoji}</span>
                        </div>
                      ) : (
                        <img 
                          src={nowPlaying.coverArt} 
                          alt="Detailed Sheet Cover" 
                          className="w-full h-full object-cover" 
                        />
                      )}
                    </div>

                    <div className="space-y-3.5 mb-6 text-left max-w-[240px] mx-auto text-slate-800">
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">곡 제목</span>
                        <span className="text-base font-extrabold text-slate-800 tracking-tight">{nowPlaying.title}</span>
                      </div>
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">가수</span>
                        <span className="text-base font-bold text-slate-700">{nowPlaying.artist}</span>
                      </div>
                      <div className="border-b-2 border-dashed border-sky-200 pb-1">
                        <span className="text-xs font-bold text-sky-600 block">만든 사람</span>
                        <span className="text-base font-extrabold text-slate-800">{nowPlaying.studentName}</span>
                      </div>
                      {nowPlaying.comment && (
                        <div className="bg-white/80 p-2.5 rounded-lg border border-sky-100 text-xs italic text-slate-600">
                          "{nowPlaying.comment}"
                        </div>
                      )}
                    </div>

                    <div className="flex items-center justify-center gap-6 text-sky-800/60 pt-2 border-t border-sky-100/80">
                      <span className="text-xs">⏮</span>
                      <span className="text-lg">⏸</span>
                      <span className="text-xs">⏭</span>
                      <div className="flex items-center gap-1 bg-yellow-100/60 px-2 py-1 rounded text-[10px] font-bold text-yellow-700">
                        <span>☑ 확인</span>
                      </div>
                    </div>

                  </div>
                </div>

                <div className="bg-sky-50 px-5 py-4 border-t border-sky-200 flex flex-col gap-2">
                  <button
                    onClick={() => handleExportCard(`printable-card-${nowPlaying.id}`)}
                    className="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2"
                  >
                    <IconDownload />
                    <span>나의 여름 활동지 이미지 저장 (PNG)</span>
                  </button>
                  <p className="text-[10px] text-center text-slate-500">
                    저장된 이미지는 추후 오프라인 인쇄물 제작, 나만의 디지털 포트폴리오 등으로 다양하게 활용할 수 있습니다.
                  </p>
                </div>

              </div>
            </div>
          )}

          {/* Footer copyright info */}
          <footer className="mt-20 border-t border-sky-200/50 pt-8 text-center text-xs text-sky-800/60 max-w-3xl mx-auto px-4">
            <p className="font-semibold mb-1">우리 반 여름 플레이리스트 소통 공간</p>
            <p>[아티버셜 월간미술] 7월 여름플리 활동지.pdf 연계 보조 프로그램</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
